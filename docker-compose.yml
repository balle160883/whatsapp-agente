services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 17
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: whatsapp-agente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_agente}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-whatsapp_agente}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-agente-net

  # ─────────────────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsapp-agente-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-agente-net

  # ─────────────────────────────────────────────────────────────
  # Next.js App
  # ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-agente-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-whatsapp_agente}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTIGRAVITY_API_KEY: ${ANTIGRAVITY_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - whatsapp-agente-net

volumes:
  postgres_data:
    name: whatsapp-agente-postgres-data
  redis_data:
    name: whatsapp-agente-redis-data

networks:
  whatsapp-agente-net:
    name: whatsapp-agente-network
    driver: bridge
